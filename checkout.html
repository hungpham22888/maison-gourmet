<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Thanh toán Maison Gourmet - Đặt hàng nhanh chóng, an toàn." />
  <title>Thanh Toán | Maison Gourmet</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body class="checkout-body">

  <!-- NAVIGATION MINIMAL -->
  <nav class="navbar checkout-navbar" id="navbar">
    <div class="nav-container" style="justify-content: center;">
      <a href="index.html" class="nav-logo" id="nav-logo-link">
        <div class="logo-mark">
          <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
            <circle cx="18" cy="18" r="17" stroke="#c2185b" stroke-width="1.5"/>
            <path d="M18 6 C12 10, 8 14, 8 18 C8 22, 12 26, 18 28 C24 26, 28 22, 28 18 C28 14, 24 10, 18 6Z" fill="#9c27b0" opacity="0.15"/>
            <text x="18" y="23" text-anchor="middle" font-family="Playfair Display" font-size="13" font-weight="700" fill="#c2185b">M</text>
          </svg>
        </div>
        <div class="logo-text">
          <span class="logo-main">MAISON</span>
          <span class="logo-sub">GOURMET</span>
        </div>
      </a>
    </div>
  </nav>

  <!-- CHECKOUT CONTENT -->
  <section class="checkout-section">
    <div class="checkout-container">
      <div class="checkout-grid">
        
        <!-- CỘT FORM TRÁI -->
        <div class="checkout-form-col">
          <div class="section-label">Hoàn tất đơn hàng</div>
          <h2 class="section-title" style="margin-bottom: 24px; font-size: 2rem;">Thông tin giao hàng</h2>
          
          <form class="order-form" id="checkout-form" action="https://formsubmit.co/maisoncakevn@gmail.com" method="POST" novalidate style="box-shadow: none; padding: 0;">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_subject" value="[MaisonGourmet] Đơn hàng thanh toán mới!">
            <input type="hidden" name="_template" value="table">
            <input type="hidden" name="🛒 CHI TIẾT ĐƠN HÀNG" id="checkout-cart-input" value="">
            
            <div class="form-row">
              <div class="form-group">
                <label for="full-name">Họ và tên *</label>
                <input type="text" id="full-name" name="👤 Họ Tên Khách Hàng" placeholder="Ví dụ: Nguyễn Văn A" required />
              </div>
              <div class="form-group">
                <label for="phone">Số điện thoại *</label>
                <input type="tel" id="phone" name="📞 Số Điện Thoại" placeholder="Ví dụ: 0909 000 000" required />
              </div>
            </div>

            <div class="form-row">
              <div class="form-group" style="flex: 100%;">
                <label for="address">Địa chỉ giao hàng chi tiết *</label>
                <input type="text" id="address" name="📍 Địa Chỉ Giao Hàng" placeholder="Số nhà, Tên đường, Phường/Xã, Quận/Huyện, Tỉnh/Thành phố..." required />
              </div>
            </div>

            <div class="form-group">
              <label for="shipping_method">Phương thức giao hàng</label>
              <select id="shipping_method" name="🚚 Phương Thức Giao Hàng">
                <option value="Giao hàng tiêu chuẩn (Miễn phí từ 20 hộp)">Giao hàng tiêu chuẩn (2-4 ngày) - Miễn phí từ 20 hộp</option>
                <option value="Giao hàng hỏa tốc">Giao hàng hỏa tốc (Xác nhận phí sau qua điện thoại)</option>
              </select>
            </div>

            <div class="form-group">
              <label for="payment_method">Phương thức thanh toán</label>
              <select id="payment_method" name="💳 Phương Thức Thanh Toán">
                <option value="COD">Thanh toán tiền mặt khi nhận hàng (COD)</option>
                <option value="Bank">Chuyển khoản qua Ngân hàng</option>
              </select>
            </div>

            <div class="form-group">
              <label for="message">Ghi chú thêm (Tùy chọn)</label>
              <textarea id="message" name="📝 Ghi Chú Của Khách" rows="3" placeholder="Vd: Giao giờ hành chính, in logo công ty..."></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-full" id="submit-checkout-btn" style="margin-top: 20px; font-size: 1.1rem; border-radius: var(--radius-md);">
              <span>Xác Nhận Đặt Hàng</span>
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
          </form>

          <!-- Success Message -->
          <div class="form-success" id="checkout-success" style="display:none; text-align: center; margin-top: 40px; padding: 40px; border-radius: var(--radius-lg); background: var(--bg-color);">
            <div class="success-icon" style="font-size: 4rem; color: #2ecc71;">✅</div>
            <h3 style="font-family: var(--font-heading); color: var(--primary); margin: 20px 0 10px;">Đặt hàng thành công!</h3>
            <p style="color: var(--text-light); line-height: 1.6;">Cảm ơn bạn đã lựa chọn Maison Gourmet. <br>Hóa đơn chi tiết đã được gửi đến hệ thống, tư vấn viên sẽ gọi xác nhận ngay trong ít phút!</p>
            <a href="index.html" class="btn btn-outline" style="margin-top: 24px; display: inline-flex;">Quay về trang chủ</a>
          </div>
        </div>

        <!-- CỘT GIỎ HÀNG PHẢI -->
        <div class="checkout-summary-col">
          <div class="checkout-summary-box">
            <h3 class="summary-title">Tóm Tắt Đơn Hàng</h3>
            
            <div class="summary-items" id="checkout-summary-items">
              <!-- Item list injected by checkout.js -->
            </div>

            <div class="summary-totals">
              <div class="summary-row">
                <span>Tạm tính</span>
                <span id="checkout-subtotal">0đ</span>
              </div>
              <div class="summary-row">
                <span>Phí vận chuyển</span>
                <span>Thỏa thuận</span>
              </div>
              <div class="summary-row total-row">
                <span>Tổng cộng</span>
                <strong id="checkout-total">0đ</strong>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </section>

  <script src="checkout.js"></script>
</body>
</html>
